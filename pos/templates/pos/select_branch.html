<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASSEY POS — Select Branch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f172a; --bg-card: #1e293b; --border: #334155;
            --text: #e2e8f0; --text-muted: #94a3b8;
            --primary: #4f46e5; --primary-light: #818cf8;
            --success: #22c55e; --warning: #f59e0b;
            --radius: 12px; --radius-sm: 8px;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 520px; width: 90%; }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .brand h1 { font-size: 1.5rem; font-weight: 700; }
        .brand p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; }
        .branch-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
            cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 1rem;
        }
        .branch-card:hover { border-color: var(--primary); background: rgba(79,70,229,0.08); }
        .branch-card .icon {
            width: 48px; height: 48px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0;
        }
        .branch-card .icon.lpg { background: rgba(34,197,94,0.15); }
        .branch-card .icon.agri { background: rgba(245,158,11,0.15); }
        .branch-card .icon.gas { background: rgba(59,130,246,0.15); }
        .branch-card .info { flex: 1; }
        .branch-card .info .name { font-size: 1rem; font-weight: 600; }
        .branch-card .info .type { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }
        .branch-card .info .address { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }
        .branch-card .arrow { color: var(--text-muted); font-size: 1.2rem; }
        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid var(--warning);
            border-radius: var(--radius-sm); padding: 0.75rem; margin-bottom: 1rem;
            text-align: center; font-size: 0.85rem; color: var(--warning);
        }
        .empty { text-align: center; padding: 2rem; color: var(--text-muted); }
        form { display: contents; }
        .branch-radio { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <div class="icon">🏪</div>
            <h1>CASSEY POS</h1>
            <p>Select a business branch to continue</p>
        </div>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        {% if branches %}
        <form method="POST">
            {% csrf_token %}
            {% for branch in branches %}
            <label class="branch-card" onclick="this.closest('form').querySelector('input[name=branch_id]').value='{{ branch.id }}'; this.closest('form').submit()">
                <div class="icon 
                    {% if branch.branch_type == 'LPG' %}lpg{% elif branch.branch_type == 'AGRI' %}agri{% elif branch.branch_type == 'GAS' %}gas{% endif %}
                ">
                    {% if branch.branch_type == 'LPG' %}🔥{% elif branch.branch_type == 'AGRI' %}🌾{% elif branch.branch_type == 'GAS' %}⛽{% else %}🏪{% endif %}
                </div>
                <div class="info">
                    <div class="name">{{ branch.name }}</div>
                    <div class="type">{{ branch.get_branch_type_display }}</div>
                    {% if branch.address %}<div class="address">{{ branch.address }}</div>{% endif %}
                </div>
                <div class="arrow">→</div>
            </label>
            {% endfor %}
            <input type="hidden" name="branch_id" value="">
        </form>
        {% else %}
        <div class="empty">
            <p style="font-size:2rem;margin-bottom:0.5rem">📭</p>
            <p>No branches configured yet.</p>
            <p style="font-size:0.8rem;margin-top:0.5rem">Contact your administrator.</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
